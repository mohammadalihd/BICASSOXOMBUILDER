<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pepe</title>

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' x='50' text-anchor='middle' font-size='78'%3E🐸%3C/text%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; }
        canvas { display: block; }
        
        .glass {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="absolute top-0 left-0 right-0 z-50 px-5 py-3 flex items-center bg-black/70 backdrop-blur-md">
        <h1 class="text-2xl font-semibold text-white tracking-tight">pepe</h1>
    </div>

    <!-- Control Panel -->
    <div class="control-panel hidden md:block absolute top-20 right-5 z-50 w-72 glass rounded-3xl p-5 text-white shadow-2xl">
        
        <div class="mb-6">
            <div class="text-[10px] text-zinc-400 mb-2 px-1">LIGHTING PRESETS</div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="applyLightingPreset('light')" class="text-xs py-3 rounded-2xl bg-white/10 hover:bg-white/20 transition">Light</button>
                <button onclick="applyLightingPreset('dark')" class="text-xs py-3 rounded-2xl bg-white/10 hover:bg-white/20 transition">Dark</button>
                <button onclick="applyLightingPreset('chrome')" class="text-xs py-3 rounded-2xl bg-gradient-to-r from-cyan-400 to-purple-500 hover:brightness-110 transition font-medium">Chrome</button>
            </div>
        </div>

        <div>
            <div class="text-[10px] text-zinc-400 mb-1.5 px-1">ROTATION</div>
            
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm">Auto Rotate</span>
                <button onclick="toggleAutoRotate()" id="autoBtn"
                        class="px-5 py-1 text-xs rounded-full bg-emerald-600 font-medium">ON</button>
            </div>

            <div class="mb-4">
                <div class="flex justify-between text-xs mb-1">
                    <span>Speed</span>
                    <span id="speedVal">0.35</span>
                </div>
                <input type="range" id="speedSlider" min="0.05" max="2" step="0.05" value="0.35"
                       class="w-full accent-emerald-500" oninput="updateSpeed()">
            </div>

            <div class="flex gap-2">
                <button onclick="spin360()" class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-2xl text-sm font-medium">Spin 360°</button>
                <button onclick="resetView()" class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-2xl text-sm font-medium">Reset</button>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="absolute inset-0 z-50 flex items-center justify-center bg-black">
        <div class="text-center px-4">
            <img src="https://arweave.net/gh82aALwC-_KyeLWzvbLhS3EX1SHuu4UfEox0K_p1c0" 
                 class="max-w-[260px] md:max-w-[340px] mx-auto mb-8 rounded-3xl shadow-2xl">
            <div class="w-72 h-1.5 bg-white/10 rounded-full mx-auto overflow-hidden">
                <div id="progress-bar" class="h-1.5 bg-gradient-to-r from-cyan-400 to-white transition-all duration-300" style="width: 0%"></div>
            </div>
            <p id="progress-text" class="text-cyan-400 text-sm font-mono mt-3">0%</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // === مدل جدید شما ===
        const modelUrl = 'https://arweave.net/UoELuLYmKkL7xCbtIq37-mbPxAGH5gke1gOJ5md66ss';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.35;
        controls.enablePan = false;

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x222222, 1.6);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 4);
        dirLight.position.set(10, 15, -8);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x88ddff, 3, 0);
        pointLight.position.set(-10, 8, 15);
        scene.add(pointLight);

        let model;
        let maxDim = 1;

        let starParticles;
        function createStarParticles() {
            const count = 5200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const velocities = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 80;
                positions[i3 + 1] = (Math.random() - 0.5) * 80;
                positions[i3 + 2] = (Math.random() - 0.5) * 80;
                velocities[i3] = (Math.random() - 0.5) * 0.002;
                velocities[i3 + 1] = (Math.random() - 0.5) * 0.002;
                velocities[i3 + 2] = (Math.random() - 0.5) * 0.002;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ 
                size: 0.028, 
                color: 0xbbbbbb, 
                transparent: true, 
                opacity: 0.85, 
                depthWrite: false, 
                blending: THREE.AdditiveBlending 
            });
            starParticles = new THREE.Points(geometry, material);
            scene.add(starParticles);
            starParticles.userData.velocities = velocities;
        }

        // Loading
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        const loader = new GLTFLoader().setDRACOLoader(dracoLoader);

        const loadingScreen = document.getElementById('loading');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        let fakeProgress = 0;
        const fakeInterval = setInterval(() => {
            if (fakeProgress < 95) fakeProgress += Math.random() * 8;
            progressBar.style.width = Math.min(fakeProgress, 100) + '%';
            progressText.textContent = Math.floor(fakeProgress) + '%';
        }, 110);

        loader.load(modelUrl, (gltf) => {
            clearInterval(fakeInterval);
            model = gltf.scene;
            scene.add(model);

            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);

            const size = box.getSize(new THREE.Vector3());
            maxDim = Math.max(size.x, size.y, size.z);

            // فاصله ۱.۹
            const cameraZ = maxDim * 1.9;
            camera.position.set(cameraZ * 0.55, maxDim * 0.9, cameraZ * 0.9);
            camera.lookAt(0, maxDim * 0.1, 0);
            controls.target.set(0, maxDim * 0.08, 0);
            controls.update();

            applyChromeToModel();

            loadingScreen.style.transition = 'opacity 0.8s';
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.style.display = 'none', 700);
        });

        function applyChromeToModel() {
            if (!model) return;
            model.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(mat => applyChromeMaterial(mat));
                    } else {
                        applyChromeMaterial(child.material);
                    }
                }
            });
        }

        function applyChromeMaterial(mat) {
            if (mat.isMeshStandardMaterial || mat.isMeshPhongMaterial) {
                mat.metalness = 1.0;
                mat.roughness = 0.08;
                mat.envMapIntensity = 2.5;
                mat.needsUpdate = true;
            }
        }

        window.applyLightingPreset = function (preset) {
            if (!model) return;
            switch(preset) {
                case 'light':
                    dirLight.intensity = 3.2; dirLight.position.set(8, 12, 6);
                    hemiLight.intensity = 1.4; pointLight.intensity = 2;
                    renderer.toneMappingExposure = 1.1;
                    break;
                case 'dark':
                    dirLight.intensity = 4.5; dirLight.position.set(-12, 10, -10);
                    hemiLight.intensity = 0.7; pointLight.intensity = 3;
                    renderer.toneMappingExposure = 0.85;
                    break;
                case 'chrome':
                    dirLight.intensity = 6.8; dirLight.position.set(12, 18, -12);
                    hemiLight.intensity = 2.0; pointLight.intensity = 5.5;
                    pointLight.position.set(-12, 10, 15);
                    renderer.toneMappingExposure = 1.6;
                    applyChromeToModel();
                    break;
            }
        };

        window.toggleAutoRotate = function () {
            controls.autoRotate = !controls.autoRotate;
            document.getElementById('autoBtn').textContent = controls.autoRotate ? "ON" : "OFF";
        };

        window.updateSpeed = function () {
            const speed = parseFloat(document.getElementById('speedSlider').value);
            controls.autoRotateSpeed = speed;
            document.getElementById('speedVal').textContent = speed.toFixed(2);
        };

        window.spin360 = function () {
            if (!model) return;
            const start = model.rotation.y;
            const end = start + Math.PI * 2;
            const startTime = Date.now();
            function animateSpin() {
                const progress = Math.min((Date.now() - startTime) / 1200, 1);
                model.rotation.y = start + (end - start) * (1 - Math.pow(1 - progress, 3));
                if (progress < 1) requestAnimationFrame(animateSpin);
            }
            animateSpin();
        };

        window.resetView = function () {
            if (model) {
                const cameraZ = maxDim * 1.9;
                camera.position.set(cameraZ * 0.55, maxDim * 0.9, cameraZ * 0.9);
                controls.target.set(0, maxDim * 0.08, 0);
                controls.update();
            }
        };

        function init() {
            createStarParticles();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (starParticles) {
                const pos = starParticles.geometry.attributes.position;
                const vel = starParticles.userData.velocities;
                for (let i = 0; i < pos.count; i++) {
                    const i3 = i * 3;
                    pos.array[i3] += vel[i3];
                    pos.array[i3 + 1] += vel[i3 + 1];
                    pos.array[i3 + 2] += vel[i3 + 2];

                    if (Math.hypot(pos.array[i3], pos.array[i3+1], pos.array[i3+2]) > 45) {
                        pos.array[i3] = (Math.random() - 0.5) * 75;
                        pos.array[i3 + 1] = (Math.random() - 0.5) * 75;
                        pos.array[i3 + 2] = (Math.random() - 0.5) * 75;
                    }
                }
                pos.needsUpdate = true;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
